name: baymax-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evidence-to-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: make sync
      - run: make test
      - run: make audit
      - uses: actions/upload-artifact@v4
        with:
          name: baymax-audit-receipt
          path: outputs/baymax_audit.json
